#!/bin/bash

echo "Scanning Kubernetes RBAC manifests for over-privileged roles..."

if grep -r 'verbs: \["\*"\]' kubernetes-security-automation-architecture/k8s; then
  echo "Over-privileged RBAC detected: wildcard verbs are not allowed"
  exit 1
fi

if grep -r 'resources: \["\*"\]' kubernetes-security-automation-architecture/k8s; then
  echo "Over-privileged RBAC detected: wildcard resources are not allowed"
  exit 1
fi

echo "RBAC policy check passed"